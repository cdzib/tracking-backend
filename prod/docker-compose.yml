services:

  app:
    build:
      context: ..
      dockerfile: prod/Dockerfile
    container_name: app
    environment:
      APP_ENV: development
      APP_DEBUG: true
      APP_URL: http://localhost:8080
    expose:
      - 9000
    ports:
      - 8082:8082
      - 5055:5055
    depends_on:
      - redis
      - mysql
    networks:
      - prod_net

  mysql:
    image: mysql:8.0.1
    restart: unless-stopped
    tty: true
    container_name: mysql-prod
    environment:
      MYSQL_DATABASE: vagonetas
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_ALLOW_EMPTY_PASSWORD: yes
    ports:
      - 3306:3306
    networks:
      - prod_net
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    container_name: phpmyadmin-prod
    depends_on:
      - mysql
    ports:
      - 8092:80
    environment:
      - PMA_HOST=mysql
      - PMA_USER=root
      - PMA_PASSWORD=root
      - PMA_ALLOW_NO_PASSWORD=true
    networks:
      - prod_net

  web:
    image: nginx:stable-alpine
    container_name: web-prod
    restart: unless-stopped
    ports:
      - 8080:80
    volumes:
      - ../src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - prod_net

  redis:
    image: redis:7-alpine
    container_name: redis-prod
    restart: unless-stopped
    ports:
      - 6381:6379
    volumes:
      - redis_data:/data
    networks:
      - prod_net

volumes:
  redis_data:
  mysql_data:

networks:
  prod_net:
    driver: bridge
